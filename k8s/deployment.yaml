# k8s/deployment.yaml
# kubectl apply -f k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moviefinder-app
  labels:
    app: moviefinder
spec:
  replicas: 2                    # Start with 2 — scale up as needed
  selector:
    matchLabels:
      app: moviefinder
  template:
    metadata:
      labels:
        app: moviefinder
    spec:
      containers:
        - name: app
          image: moviefinder:latest      # Update with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: moviefinder-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: moviefinder-secrets
                  key: JWT_SECRET
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: moviefinder-secrets
                  key: TMDB_API_KEY
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: moviefinder-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: moviefinder-secrets
                  key: EMAIL_PASS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/auth/me
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/me
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: moviefinder-service
spec:
  selector:
    app: moviefinder
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP


