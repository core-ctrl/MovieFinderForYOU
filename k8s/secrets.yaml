# k8s/secrets.yaml
# Fill in base64-encoded values: echo -n "your-value" | base64
# DO NOT commit this file with real values — add to .gitignore
apiVersion: v1
kind: Secret
metadata:
  name: moviefinder-secrets
type: Opaque
data:
  MONGODB_URI:  <base64-encoded-value>
  JWT_SECRET:   <base64-encoded-value>
  TMDB_API_KEY: <base64-encoded-value>
  EMAIL_USER:   <base64-encoded-value>
  EMAIL_PASS:   <base64-encoded-value>
EOF

cat > /home/claude/movie-finder-v2/k8s/README.md << 'EOF'
# Kubernetes Deployment

## Setup

### 1. Create secrets (replace values)
```bash
kubectl create secret generic moviefinder-secrets \
  --from-literal=MONGODB_URI="your-atlas-uri" \
  --from-literal=JWT_SECRET="your-jwt-secret" \
  --from-literal=TMDB_API_KEY="your-tmdb-key" \
  --from-literal=EMAIL_USER="moviefinderforyou@gmail.com" \
  --from-literal=EMAIL_PASS="your-app-password"
```

### 2. Build and push Docker image
```bash
docker build -t your-registry/moviefinder:latest .
docker push your-registry/moviefinder:latest
```

### 3. Apply manifests
```bash
kubectl apply -f k8s/deployment.yaml
kubectl apply -f k8s/ingress.yaml
kubectl apply -f k8s/hpa.yaml
```

### 4. Check status
```bash
kubectl get pods
kubectl get services
kubectl get ingress
kubectl logs -f deployment/moviefinder-app
```

### 5. Scale manually
```bash
kubectl scale deployment moviefinder-app --replicas=5
```
EOF